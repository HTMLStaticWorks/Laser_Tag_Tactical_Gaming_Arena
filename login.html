<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BattleGrid</title>
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <style>
        body {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--color-bg);
            overflow: hidden;
            position: relative;
        }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vmin;
            height: 80vmin;
            opacity: 0.03;
            z-index: 0;
            pointer-events: none;
        }

        .auth-card {
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius);
            padding: 3rem 2rem;
            width: 100%;
            max-width: 400px;
            position: relative;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
        }

        .auth-logo {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--color-text);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 2rem;
            display: block;
        }
        .auth-logo span { color: var(--color-primary); }

        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 1.5rem 0;
            color: var(--color-text-muted);
            font-size: 0.85rem;
        }
        .auth-divider::before, .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--color-border);
        }
        .auth-divider::before { margin-right: 0.5rem; }
        .auth-divider::after { margin-left: 0.5rem; }

        .btn-social {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.75rem;
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            color: var(--color-text);
            font-family: var(--font-heading);
            font-size: 1rem;
            font-weight: 600;
            border-radius: var(--radius);
            cursor: pointer;
            margin-bottom: 0.75rem;
            transition: var(--transition);
        }
        .btn-social:hover {
            border-color: var(--color-text);
        }
        .btn-google {
            background: #fff;
            color: #000;
        }
        .auth-preferences {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            display: flex;
            gap: 1rem;
            z-index: 100;
        }

        @media(max-width: 480px) {
            body {
                height: auto;
                min-height: 100vh;
                overflow-y: auto;
                align-items: flex-start;
                padding: 4.5rem 1rem 2rem 1rem;
            }
            .auth-card {
                max-height: none;
            }
            .auth-preferences {
                top: 1rem;
                right: 1rem;
            }
        }

        .password-wrapper {
            position: relative;
        }
        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--color-text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            font-size: 1.25rem;
            transition: color 0.3s ease;
            z-index: 10;
        }
        .password-toggle:hover {
            color: var(--color-primary);
        }
        .password-wrapper .form-control {
            padding-right: 2.75rem;
        }
        [dir="rtl"] .password-toggle {
            right: auto;
            left: 1rem;
        }
        [dir="rtl"] .password-wrapper .form-control {
            padding-right: 1rem;
            padding-left: 2.75rem;
        }
        .auth-card a.text-secondary {
            transition: var(--transition);
        }
        .auth-card a.text-secondary:hover {
            color: var(--color-primary);
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="auth-preferences">
        <button class="action-btn theme-toggle" aria-label="Toggle Theme"><i class="ph ph-sun"></i></button>
        <button class="action-btn rtl-toggle" aria-label="Toggle RTL"><i class="ph ph-arrows-left-right"></i></button>
    </div>

    <svg class="watermark" viewBox="0 0 100 100" fill="none" stroke="var(--color-primary)" stroke-width="0.5">
        <circle cx="50" cy="50" r="40"/>
        <path d="M50 0 V30 M50 70 V100 M0 50 H30 M70 50 H100"/>
        <circle cx="50" cy="50" r="10" fill="var(--color-primary)" opacity="0.5"/>
    </svg>

    <div class="auth-card fade-in-up">
        <a href="index.html" class="auth-logo">Battle<span>Grid</span></a>
        
        <form action="dashboard.html" data-validate="true">
            <div class="form-group" style="margin-bottom: 1rem;">
                <input type="email" class="form-control" placeholder="Email Address" required>
            </div>
            <div class="form-group password-wrapper" style="margin-bottom: 1.25rem;">
                <input type="password" class="form-control" placeholder="Password" required>
                <button type="button" class="password-toggle" aria-label="Toggle Password Visibility">
                    <i class="ph ph-eye"></i>
                </button>
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; font-size: 0.85rem;">
                <label style="display: flex; gap: 0.5rem; align-items: center; cursor: pointer;">
                    <input type="checkbox" name="remember" style="margin-top: 0.1rem;">
                    <span style="color: var(--color-text-muted);">Remember Me</span>
                </label>
                <a href="#" class="text-secondary">Forgot Password?</a>
            </div>
            
            <button type="submit" class="btn btn-primary btn-full">LOGIN TO BASE CAMP</button>
        </form>

        <div class="auth-divider">OR</div>

        <button class="btn-social btn-google">
            <svg width="18" height="18" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
        </button>
        
        <button class="btn-social">
            <i class="ph ph-apple-logo"></i> Continue with Apple
        </button>

        <div style="margin-top: 2rem;">
            <a href="register.html" class="text-secondary" style="font-size: 0.9rem;">Don't have an account? Register &rarr;</a>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
    <script>
        document.querySelectorAll('.password-toggle').forEach(button => {
            button.addEventListener('click', () => {
                const input = button.parentElement.querySelector('input');
                const icon = button.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.className = 'ph ph-eye-slash';
                } else {
                    input.type = 'password';
                    icon.className = 'ph ph-eye';
                }
            });
        });
    </script>
</body>
</html>
